<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <meta name="description" content="{{ description }}">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site_url }}{{ current_path }}">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:image" content="{{ site_url }}/static/img/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ site_url }}{{ current_path }}">
    <meta property="twitter:title" content="{{ title }}">
    <meta property="twitter:description" content="{{ description }}">
    <meta property="twitter:image" content="{{ site_url }}/static/img/og-image.png">

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ site_url }}{{ current_path }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "{{ site_name }}",
      "url": "{{ site_url }}"
    }
    </script>
</head>
<body>
    <!-- Top Ad Placeholder (728x90 desktop / 320x100 mobile) -->
    <div class="ad-container ad-top">
        <div class="ad-placeholder">Ad: Top Banner (728x90)</div>
    </div>

    <!-- Sticky Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Insta<span class="highlight">DL</span></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Before Footer Ad Placeholder (728x90) -->
    <div class="ad-container ad-footer">
        <div class="ad-placeholder">Ad: Before Footer (728x90)</div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 {{ site_name }}. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="/privacy-policy">Privacy Policy</a></li>
                <li><a href="/terms">Terms of Service</a></li>
                <li><a href="/dmca">DMCA</a></li>
            </ul>
        </div>
    </footer>

    <!-- JS -->
    <script src="/static/js/main.js"></script>
</body>
</html>
