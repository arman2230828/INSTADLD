services:
  - type: web
    name: instadl-web
    env: python
    repo: https://github.com/yourusername/instadl.git # Update this!
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CORS_ORIGINS
        value: "*"
    autoDeploy: false
